name: Frontend Deploy

on:
  workflow_run:
    workflows:
      - Frontend CI
    types:
      - completed

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: ci.yml
          workflow_conclusion: success
          run_id: ${{ github.event.workflow_run.id }}
          name: frontend-dist
          path: dist
          check_artifacts: true

      - name: Verify deployment target
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            if [ ! -d "${{ secrets.SERVER_PATH }}" ]; then
              echo "Deployment target does not exist: ${{ secrets.SERVER_PATH }}" >&2
              exit 1
            fi

      - name: Deploy dist to server
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          SOURCE: dist/
          TARGET: ${{ secrets.SERVER_PATH }}
          ARGS: -rlgoDzvc --delete

      - name: Verify deployed files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "Deployment target: ${{ secrets.SERVER_PATH }}"
            find "${{ secrets.SERVER_PATH }}" -maxdepth 2 -type f -printf "%TY-%Tm-%Td %TH:%TM:%TS %p\n" | sort -r | head -n 10

